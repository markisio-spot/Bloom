kind = "web"
previewPath = "/"
title = "Bloom Web"
version = "1.0.0"
id = "artifacts/bloom-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25896

[services.development]
run = "pnpm --filter @workspace/bloom-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bloom-web", "run", "build" ]
publicDir = "artifacts/bloom-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25896"
BASE_PATH = "/"
