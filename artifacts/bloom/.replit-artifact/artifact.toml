kind = "mobile"
previewPath = "/"
title = "Bloom"
version = "1.0.0"
id = "artifacts/bloom"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19129

[services.development]
run = "pnpm --filter @workspace/bloom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bloom", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bloom", "run", "serve" ]

[services.env]
PORT = "19129"
BASE_PATH = "/"
